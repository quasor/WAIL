name: Prepare Release

on:
  push:
    branches: [main]

concurrency:
  group: prepare-release
  cancel-in-progress: true

jobs:
  prepare-release:
    # Skip if this push is the release PR being merged
    if: "!contains(github.event.head_commit.message, 'chore: prepare release')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install knope
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sSfL "https://github.com/knope-dev/knope/releases/latest/download/knope-x86_64-unknown-linux-musl.tgz" \
            | tar -xz --strip-components=1 -C /usr/local/bin/

      - uses: dtolnay/rust-toolchain@stable

      - name: Ensure changeset exists for patch release
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          HAS_CHANGESETS=false
          HAS_CONVENTIONAL=false

          if ls .changeset/*.md 1>/dev/null 2>&1; then
            HAS_CHANGESETS=true
          fi

          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          if git log --oneline "$RANGE" | grep -qE '^[0-9a-f]+ (feat|fix|feat!|fix!|refactor|perf)[(:!]'; then
            HAS_CONVENTIONAL=true
          fi

          if [ "$HAS_CHANGESETS" = false ] && [ "$HAS_CONVENTIONAL" = false ]; then
            echo "No changesets or conventional commits found. Creating fallback patch changeset."
            mkdir -p .changeset
            COMMIT_MSG=$(git log -1 --format='%s')
            printf -- '---\ndefault: patch\n---\n\n%s\n' "$COMMIT_MSG" > .changeset/auto-patch.md
          fi

      - name: Run knope prepare-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: knope prepare-release

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          EXISTING_PR=$(gh pr list --head release --base main --json number --jq '.[0].number' 2>/dev/null || echo "")

          BODY="Automated release preparation for v${VERSION}.

          Merging this PR will create GitHub release v${VERSION} and trigger artifact builds."

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" \
              --title "chore: prepare release v${VERSION}" \
              --body "$BODY"
            echo "Updated existing PR #${EXISTING_PR}"
          else
            gh pr create \
              --head release \
              --base main \
              --title "chore: prepare release v${VERSION}" \
              --body "$BODY"
          fi
