name: Build

on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-nih-plug
            ~/.cargo/bin/cargo-tauri
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Install opus
        run: brew install opus

      - name: Install cargo-nih-plug
        run: which cargo-nih-plug || cargo install --git https://github.com/robbert-vdh/nih-plug.git cargo-nih-plug

      - name: Install tauri-cli
        run: which cargo-tauri || cargo install tauri-cli

      - name: Build CLI binary
        run: cargo build -p wail-app --release

      - name: Build plugin
        run: cargo xtask build-plugin

      - name: Build Tauri app
        run: cargo tauri build -c crates/wail-tauri/tauri.conf.json

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/release/wail-app dist/
          cp -r target/bundled/wail-plugin.clap dist/
          cp -r target/bundled/wail-plugin.vst3 dist/
          cp -r target/release/bundle/macos/WAIL.app dist/
          cp target/release/bundle/dmg/*.dmg dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: wail-macos-x64
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-nih-plug
            ~/.cargo/bin/cargo-tauri.exe
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install opus via vcpkg
        run: vcpkg install opus:x64-windows

      - name: Install pkg-config
        run: choco install pkgconfiglite -y

      - name: Install cargo-nih-plug
        run: |
          if (!(Get-Command cargo-nih-plug -ErrorAction SilentlyContinue)) {
            cargo install --git https://github.com/robbert-vdh/nih-plug.git cargo-nih-plug
          }
        shell: pwsh

      - name: Install tauri-cli
        run: |
          if (!(Get-Command cargo-tauri -ErrorAction SilentlyContinue)) {
            cargo install tauri-cli
          }
        shell: pwsh

      - name: Build CLI binary
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo build -p wail-app --release

      - name: Build plugin
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo xtask build-plugin

      - name: Build Tauri app
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo tauri build -c crates/wail-tauri/tauri.conf.json

      - name: Collect artifacts
        run: |
          mkdir dist
          copy target\release\wail-app.exe dist\
          copy C:\vcpkg\installed\x64-windows\bin\opus.dll dist\
          xcopy /E /I target\bundled\wail-plugin.clap dist\wail-plugin.clap\
          xcopy /E /I target\bundled\wail-plugin.vst3 dist\wail-plugin.vst3\
          copy C:\vcpkg\installed\x64-windows\bin\opus.dll dist\wail-plugin.vst3\Contents\x86_64-win\
          copy C:\vcpkg\installed\x64-windows\bin\opus.dll dist\wail-plugin.clap\
          xcopy /E /I target\release\bundle\nsis dist\nsis\
          xcopy /E /I target\release\bundle\msi dist\msi\

      - uses: actions/upload-artifact@v4
        with:
          name: wail-windows-x64
          path: dist\
