name: Build

on:
  push:
    branches: [main, "claude/**"]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: prepare release')"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-binstall
            ~/.cargo/bin/cargo-nih-plug
            ~/.cargo/bin/cargo-tauri
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Install opus
        run: brew install opus

      - name: Install cargo-binstall
        run: which cargo-binstall || curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cargo-nih-plug
        run: which cargo-nih-plug || cargo install --git https://github.com/robbert-vdh/nih-plug.git cargo-nih-plug

      - name: Install tauri-cli
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          which cargo-tauri && exit 0
          TAURI_TAG=$(gh api repos/tauri-apps/tauri/releases --jq '[.[] | select(.tag_name | startswith("tauri-cli-v"))][0].tag_name')
          gh release download "$TAURI_TAG" --repo tauri-apps/tauri --pattern "cargo-tauri-aarch64-apple-darwin.zip" --dir /tmp
          unzip -o /tmp/cargo-tauri-aarch64-apple-darwin.zip -d ~/.cargo/bin/

      - name: Build plugin
        run: cargo xtask build-plugin

      - name: Create opus.dll placeholder for cross-platform resources
        run: mkdir -p target/bundled && touch target/bundled/opus.dll

      - name: Clean stale Tauri bundles
        run: rm -rf target/release/bundle/

      - name: Build Tauri app
        run: cargo tauri build

      - name: List bundle output
        run: find target/release/bundle -type d -maxdepth 3 2>/dev/null || echo "No bundle directory found"

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp -r target/bundled/wail-plugin-send.clap dist/
          cp -r target/bundled/wail-plugin-send.vst3 dist/
          cp -r target/bundled/wail-plugin-recv.clap dist/
          cp -r target/bundled/wail-plugin-recv.vst3 dist/
          APP=$(find target/release/bundle -name "*.app" -maxdepth 3 2>/dev/null | head -1)
          if [ -n "$APP" ]; then cp -r "$APP" dist/; else echo "Warning: no .app bundle found"; fi
          cp target/release/bundle/dmg/*.dmg dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: wail-macos
          path: dist/

  build-windows:
    runs-on: windows-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: prepare release')"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-binstall.exe
            ~/.cargo/bin/cargo-nih-plug
            ~/.cargo/bin/cargo-tauri.exe
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install opus via vcpkg
        run: vcpkg install opus:x64-windows

      - name: Install pkg-config
        run: choco install pkgconfiglite -y

      - name: Install cargo-binstall
        run: |
          if (!(Get-Command cargo-binstall -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Unrestricted -Scope Process; iex (iwr "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1").Content
          }
        shell: pwsh

      - name: Install cargo-nih-plug
        run: |
          if (!(Get-Command cargo-nih-plug -ErrorAction SilentlyContinue)) {
            cargo install --git https://github.com/robbert-vdh/nih-plug.git cargo-nih-plug
          }
        shell: pwsh

      - name: Install tauri-cli
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if (!(Get-Command cargo-tauri -ErrorAction SilentlyContinue)) {
            $tag = (gh api repos/tauri-apps/tauri/releases --jq '[.[] | select(.tag_name | startswith("tauri-cli-v"))][0].tag_name') | Out-String | ForEach-Object { $_.Trim() }
            gh release download $tag --repo tauri-apps/tauri --pattern "cargo-tauri-x86_64-pc-windows-msvc.zip" --dir $env:TEMP
            Expand-Archive "$env:TEMP\cargo-tauri-x86_64-pc-windows-msvc.zip" -DestinationPath "$env:USERPROFILE\.cargo\bin" -Force
          }
        shell: pwsh

      - name: Build plugin
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo xtask build-plugin

      - name: Stage opus.dll for Tauri bundling
        shell: pwsh
        run: Copy-Item C:\vcpkg\installed\x64-windows\bin\opus.dll target\bundled\opus.dll

      - name: Clean stale Tauri bundles
        run: Remove-Item -Recurse -Force target\release\bundle -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Build Tauri app
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo tauri build

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item C:\vcpkg\installed\x64-windows\bin\opus.dll dist\
          Copy-Item target\bundled\wail-plugin-send.clap dist\
          Copy-Item -Recurse target\bundled\wail-plugin-send.vst3 dist\wail-plugin-send.vst3
          Copy-Item target\bundled\wail-plugin-recv.clap dist\
          Copy-Item -Recurse target\bundled\wail-plugin-recv.vst3 dist\wail-plugin-recv.vst3
          if (Test-Path target\release\bundle\nsis) { Copy-Item -Recurse target\release\bundle\nsis dist\nsis }
          if (Test-Path target\release\bundle\msi) { Copy-Item -Recurse target\release\bundle\msi dist\msi }

      - uses: actions/upload-artifact@v4
        with:
          name: wail-windows-x64
          path: dist\

  build-linux:
    runs-on: ubuntu-22.04
    if: "!startsWith(github.event.head_commit.message, 'chore: prepare release')"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-binstall
            ~/.cargo/bin/cargo-nih-plug
            ~/.cargo/bin/cargo-tauri
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            libopus-dev \
            cmake \
            g++ \
            libx11-xcb-dev

      - name: Install cargo-binstall
        run: which cargo-binstall || curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cargo-nih-plug
        run: which cargo-nih-plug || cargo install --git https://github.com/robbert-vdh/nih-plug.git cargo-nih-plug

      - name: Install tauri-cli
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          which cargo-tauri && exit 0
          TAURI_TAG=$(gh api repos/tauri-apps/tauri/releases --jq '[.[] | select(.tag_name | startswith("tauri-cli-v"))][0].tag_name')
          gh release download "$TAURI_TAG" --repo tauri-apps/tauri --pattern "cargo-tauri-x86_64-unknown-linux-gnu.tgz" --dir /tmp
          tar -xzf /tmp/cargo-tauri-x86_64-unknown-linux-gnu.tgz -C ~/.cargo/bin/

      - name: Build plugin
        run: cargo xtask build-plugin

      - name: Create opus.dll placeholder for cross-platform resources
        run: mkdir -p target/bundled && touch target/bundled/opus.dll

      - name: Clean stale Tauri bundles
        run: rm -rf target/release/bundle/

      - name: Build Tauri app
        run: cargo tauri build

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/bundled/wail-plugin-send.clap dist/
          cp -r target/bundled/wail-plugin-send.vst3 dist/
          cp target/bundled/wail-plugin-recv.clap dist/
          cp -r target/bundled/wail-plugin-recv.vst3 dist/
          cp target/release/bundle/appimage/*.AppImage dist/ || true
          cp target/release/bundle/deb/*.deb dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: wail-linux-x64
          path: dist/
