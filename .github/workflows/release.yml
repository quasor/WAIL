name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-binstall
            ~/.cargo/bin/cargo-nih-plug
            ~/.cargo/bin/cargo-tauri
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Install opus
        run: brew install opus

      - name: Install cargo-binstall
        run: which cargo-binstall || curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cargo-nih-plug
        run: which cargo-nih-plug || cargo install --git https://github.com/robbert-vdh/nih-plug.git cargo-nih-plug

      - name: Install tauri-cli
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          which cargo-tauri && exit 0
          TAURI_TAG=$(gh api repos/tauri-apps/tauri/releases --jq '[.[] | select(.tag_name | startswith("tauri-cli-v"))][0].tag_name')
          gh release download "$TAURI_TAG" --repo tauri-apps/tauri --pattern "cargo-tauri-aarch64-apple-darwin.zip" --dir /tmp
          unzip -o /tmp/cargo-tauri-aarch64-apple-darwin.zip -d ~/.cargo/bin/

      - name: Build CLI binary
        run: cargo build -p wail-app --release

      - name: Build plugin
        run: cargo xtask build-plugin

      - name: Build Tauri app
        run: cargo tauri build --bundles dmg

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/release/wail-app dist/
          cp -r target/bundled/wail-plugin-send.clap dist/
          cp -r target/bundled/wail-plugin-send.vst3 dist/
          cp -r target/bundled/wail-plugin-recv.clap dist/
          cp -r target/bundled/wail-plugin-recv.vst3 dist/
          cp target/release/bundle/dmg/*.dmg dist/ || true

      - name: Create .pkg installer
        run: cargo xtask package-plugin --no-build

      - uses: actions/upload-artifact@v4
        with:
          name: wail-release-macos
          path: |
            dist/
            target/wail-plugin-*-macos.pkg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-binstall.exe
            ~/.cargo/bin/cargo-nih-plug
            ~/.cargo/bin/cargo-tauri.exe
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install opus via vcpkg
        run: vcpkg install opus:x64-windows

      - name: Install pkg-config
        run: choco install pkgconfiglite -y

      - name: Install cargo-binstall
        run: |
          if (!(Get-Command cargo-binstall -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Unrestricted -Scope Process; iex (iwr "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1").Content
          }
        shell: pwsh

      - name: Install cargo-nih-plug
        run: |
          if (!(Get-Command cargo-nih-plug -ErrorAction SilentlyContinue)) {
            cargo install --git https://github.com/robbert-vdh/nih-plug.git cargo-nih-plug
          }
        shell: pwsh

      - name: Install tauri-cli
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if (!(Get-Command cargo-tauri -ErrorAction SilentlyContinue)) {
            $tag = (gh api repos/tauri-apps/tauri/releases --jq '[.[] | select(.tag_name | startswith("tauri-cli-v"))][0].tag_name') | Out-String | ForEach-Object { $_.Trim() }
            gh release download $tag --repo tauri-apps/tauri --pattern "cargo-tauri-x86_64-pc-windows-msvc.zip" --dir $env:TEMP
            Expand-Archive "$env:TEMP\cargo-tauri-x86_64-pc-windows-msvc.zip" -DestinationPath "$env:USERPROFILE\.cargo\bin" -Force
          }
        shell: pwsh

      - name: Build CLI binary
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo build -p wail-app --release

      - name: Build plugin
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo xtask build-plugin

      - name: Build Tauri app
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo tauri build --bundles nsis

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target\release\wail-app.exe dist\
          Copy-Item target\release\wail-tauri.exe dist\
          Copy-Item C:\vcpkg\installed\x64-windows\bin\opus.dll dist\
          Copy-Item target\bundled\wail-plugin-send.clap dist\
          Copy-Item -Recurse target\bundled\wail-plugin-send.vst3 dist\wail-plugin-send.vst3
          Copy-Item target\bundled\wail-plugin-recv.clap dist\
          Copy-Item -Recurse target\bundled\wail-plugin-recv.vst3 dist\wail-plugin-recv.vst3
          if (Test-Path target\release\bundle\nsis\*.exe) { Copy-Item target\release\bundle\nsis\*.exe dist\ }
          if (Test-Path target\release\bundle\msi\*.msi) { Copy-Item target\release\bundle\msi\*.msi dist\ }

      - uses: actions/upload-artifact@v4
        with:
          name: wail-release-windows
          path: dist\

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Zip platform artifacts
        run: |
          cd wail-release-macos/dist && zip -r ../../wail-macos-x64.zip . && cd ../..
          cd wail-release-windows && zip -r ../wail-windows-x64.zip . && cd ..

      - name: Find individual installers
        id: files
        run: |
          echo "pkg=$(ls wail-release-macos/target/wail-plugin-*-macos.pkg 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          echo "dmg=$(ls wail-release-macos/dist/*.dmg 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          echo "nsis=$(ls wail-release-windows/WAIL*.exe 2>/dev/null | head -1 || true)" >> "$GITHUB_OUTPUT"
          echo "msi=$(ls wail-release-windows/*.msi 2>/dev/null | head -1 || true)" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            wail-macos-x64.zip
            wail-windows-x64.zip
            ${{ steps.files.outputs.pkg }}
            ${{ steps.files.outputs.dmg }}
            ${{ steps.files.outputs.nsis }}
            ${{ steps.files.outputs.msi }}
