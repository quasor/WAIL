name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.5.0)'
        required: true
        type: string

jobs:
  # Build a "fat" source tarball that includes the vendor/link git submodule.
  # GitHub's auto-generated archives omit submodule contents, so we produce our
  # own tarball and upload it as a release artifact.  The Homebrew formula uses
  # this tarball as its `url` so that the Ableton Link SDK is available during
  # `brew install --build-from-source`.
  build-homebrew-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          submodules: recursive

      - name: Create fat source tarball
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          STAGING="wail-${VERSION}"
          # Export the repo tree (excludes .git) into a named staging directory
          mkdir -p "/tmp/${STAGING}"
          git archive --format=tar HEAD | tar -x -C "/tmp/${STAGING}"
          # Overlay the submodule contents (git archive omits them)
          cp -r vendor/link "/tmp/${STAGING}/vendor/link"
          # Package and compute checksum
          tar -czf "wail-${VERSION}-src.tar.gz" -C /tmp "${STAGING}"
          sha256sum "wail-${VERSION}-src.tar.gz" | awk '{print $1}' > "wail-${VERSION}-src.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: wail-homebrew-src
          path: |
            wail-*-src.tar.gz
            wail-*-src.tar.gz.sha256

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache vcpkg
        id: vcpkg-cache
        uses: actions/cache@v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-opus-x64-windows-v1

      - name: Install opus via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: vcpkg install opus:x64-windows

      - name: Install pkg-config
        run: choco install pkgconfiglite -y

      - name: Cache CLI tools
        uses: actions/cache@v5
        with:
          path: |
            ~\.cargo\bin\cargo-tauri.exe
          key: windows-cli-tools-v1

      - name: Install tauri-cli
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if (!(Get-Command cargo-tauri -ErrorAction SilentlyContinue)) {
            $tag = (gh api repos/tauri-apps/tauri/releases --jq '[.[] | select(.tag_name | startswith("tauri-cli-v"))][0].tag_name') | Out-String | ForEach-Object { $_.Trim() }
            gh release download $tag --repo tauri-apps/tauri --pattern "cargo-tauri-x86_64-pc-windows-msvc.zip" --dir $env:TEMP
            Expand-Archive "$env:TEMP\cargo-tauri-x86_64-pc-windows-msvc.zip" -DestinationPath "$env:USERPROFILE\.cargo\bin" -Force
          }
        shell: pwsh

      - name: Build plugin
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo xtask bundle-plugin

      - name: Stage opus.dll for Tauri bundling
        shell: pwsh
        run: Copy-Item C:\vcpkg\installed\x64-windows\bin\opus.dll target\bundled\opus.dll

      - name: Clean stale Tauri bundles
        run: Remove-Item -Recurse -Force target\release\bundle -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Build Tauri app
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo tauri build --no-bundle

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target\release\wail-tauri.exe dist\WAIL.exe
          if (Test-Path target\release\resources) {
            Copy-Item -Recurse target\release\resources dist\resources
          }
          Copy-Item C:\vcpkg\installed\x64-windows\bin\opus.dll dist\
          Copy-Item target\bundled\wail-plugin-send.clap dist\
          Copy-Item -Recurse target\bundled\wail-plugin-send.vst3 dist\wail-plugin-send.vst3
          Copy-Item target\bundled\wail-plugin-recv.clap dist\
          Copy-Item -Recurse target\bundled\wail-plugin-recv.vst3 dist\wail-plugin-recv.vst3
          Copy-Item dist\opus.dll dist\wail-plugin-send.vst3\Contents\x86_64-win\
          Copy-Item dist\opus.dll dist\wail-plugin-recv.vst3\Contents\x86_64-win\

      - uses: actions/upload-artifact@v7
        with:
          name: wail-release-windows
          path: dist\

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            libopus-dev \
            cmake \
            g++ \
            libx11-xcb-dev

      - name: Cache CLI tools
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: linux-cli-tools-v1

      - name: Install tauri-cli
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          which cargo-tauri && exit 0
          TAURI_TAG=$(gh api repos/tauri-apps/tauri/releases --jq '[.[] | select(.tag_name | startswith("tauri-cli-v"))][0].tag_name')
          gh release download "$TAURI_TAG" --repo tauri-apps/tauri --pattern "cargo-tauri-x86_64-unknown-linux-gnu.tgz" --dir /tmp
          tar -xzf /tmp/cargo-tauri-x86_64-unknown-linux-gnu.tgz -C ~/.cargo/bin/

      - name: Build plugin
        run: cargo xtask bundle-plugin

      - name: Create opus.dll placeholder for cross-platform resources
        run: mkdir -p target/bundled && touch target/bundled/opus.dll

      - name: Clean stale Tauri bundles
        run: rm -rf target/release/bundle/

      - name: Build Tauri app
        run: cargo tauri build --bundles appimage,deb

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/bundled/wail-plugin-send.clap dist/
          cp -r target/bundled/wail-plugin-send.vst3 dist/
          cp target/bundled/wail-plugin-recv.clap dist/
          cp -r target/bundled/wail-plugin-recv.vst3 dist/
          cp target/release/bundle/appimage/*.AppImage dist/ || true
          cp target/release/bundle/deb/*.deb dist/ || true

      - uses: actions/upload-artifact@v7
        with:
          name: wail-release-linux
          path: dist/

  create-release:
    needs: [build-windows, build-linux, build-homebrew-tarball]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          path: source
          sparse-checkout: homebrew

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Zip platform artifacts
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          cd wail-release-windows && zip -r ../wail-windows-x64-${VERSION}.zip . && cd ..
          cd wail-release-linux && zip -r ../wail-linux-x64-${VERSION}.zip . && cd ..

      - name: Find individual installers
        id: files
        run: |
          echo "appimage=$(ls wail-release-linux/*.AppImage 2>/dev/null | head -1 || true)" >> "$GITHUB_OUTPUT"
          echo "deb=$(ls wail-release-linux/*.deb 2>/dev/null | head -1 || true)" >> "$GITHUB_OUTPUT"
          echo "src_tarball=$(ls wail-homebrew-src/wail-*-src.tar.gz 2>/dev/null | head -1 || true)" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            wail-windows-x64-${{ steps.tag.outputs.version }}.zip
            wail-linux-x64-${{ steps.tag.outputs.version }}.zip
            ${{ steps.files.outputs.appimage }}
            ${{ steps.files.outputs.deb }}
            ${{ steps.files.outputs.src_tarball }}

      # Update the Homebrew tap formula with the new version and SHA256.
      # Requires a HOMEBREW_TAP_TOKEN secret with push access to MostDistant/homebrew-wail.
      # If the secret is not configured, this step is skipped gracefully.
      - name: Update Homebrew tap
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          [ -z "${GH_TOKEN}" ] && echo "HOMEBREW_TAP_TOKEN not set, skipping tap update." && exit 0
          VERSION="${{ steps.tag.outputs.version }}"
          SHA=$(cat wail-homebrew-src/wail-*-src.tar.gz.sha256 | head -1)
          URL="https://github.com/MostDistant/WAIL/releases/download/v${VERSION}/wail-${VERSION}-src.tar.gz"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/MostDistant/homebrew-wail.git" tap
          # Copy full formula from source so all formula changes are deployed
          cp source/homebrew/wail.rb tap/Formula/wail.rb
          # Patch URL and SHA for this release
          sed -i \
            "s|url \".*\"|url \"${URL}\"|" \
            tap/Formula/wail.rb
          sed -i \
            "s|sha256 \".*\"|sha256 \"${SHA}\"|" \
            tap/Formula/wail.rb
          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git commit -am "Update wail to v${VERSION}"
          git push
