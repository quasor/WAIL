name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-nih-plug
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install opus
        run: brew install opus

      - name: Install cargo-nih-plug
        run: which cargo-nih-plug || cargo install --git https://github.com/robbert-vdh/nih-plug.git cargo-nih-plug

      - name: Build CLI binaries
        run: cargo build -p wail-app -p wail-signaling --release

      - name: Build plugin
        run: cargo xtask build-plugin

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/release/wail-app dist/
          cp target/release/wail-signaling dist/
          cp -r target/bundled/wail-plugin.clap dist/
          cp -r target/bundled/wail-plugin.vst3 dist/

      - name: Create .pkg installer
        run: cargo xtask package-plugin --no-build

      - uses: actions/upload-artifact@v4
        with:
          name: wail-release-macos
          path: |
            dist/
            target/wail-plugin-*-macos.pkg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-nih-plug
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install opus via vcpkg
        run: vcpkg install opus:x64-windows

      - name: Install pkg-config
        run: choco install pkgconfiglite -y

      - name: Install cargo-nih-plug
        run: |
          if (!(Get-Command cargo-nih-plug -ErrorAction SilentlyContinue)) {
            cargo install --git https://github.com/robbert-vdh/nih-plug.git cargo-nih-plug
          }
        shell: pwsh

      - name: Build CLI binaries
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo build -p wail-app -p wail-signaling --release

      - name: Build plugin
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo xtask build-plugin

      - name: Collect artifacts
        run: |
          mkdir dist
          copy target\release\wail-app.exe dist\
          copy target\release\wail-signaling.exe dist\
          copy C:\vcpkg\installed\x64-windows\bin\opus.dll dist\
          xcopy /E /I target\bundled\wail-plugin.clap dist\wail-plugin.clap\
          xcopy /E /I target\bundled\wail-plugin.vst3 dist\wail-plugin.vst3\
          copy C:\vcpkg\installed\x64-windows\bin\opus.dll dist\wail-plugin.vst3\Contents\x86_64-win\
          copy C:\vcpkg\installed\x64-windows\bin\opus.dll dist\wail-plugin.clap\

      - uses: actions/upload-artifact@v4
        with:
          name: wail-release-windows
          path: dist\

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Zip platform artifacts
        run: |
          cd wail-release-macos/dist && zip -r ../../wail-macos-x64.zip . && cd ../..
          cd wail-release-windows && zip -r ../wail-windows-x64.zip . && cd ..

      - name: Find .pkg file
        id: pkg
        run: echo "path=$(ls wail-release-macos/target/wail-plugin-*-macos.pkg)" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            wail-macos-x64.zip
            ${{ steps.pkg.outputs.path }}
            wail-windows-x64.zip
