networks:
  net-a:
    driver: bridge
  net-b:
    driver: bridge
  net-infra:
    driver: bridge

services:
  signaling:
    build:
      context: ./signaling-server
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
    networks:
      - net-infra
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  peer-a:
    build:
      context: .
      dockerfile: Dockerfile.test-client
    depends_on:
      signaling:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    environment:
      WAN_DELAY: "${WAN_DELAY:-50ms}"
      WAN_JITTER: "${WAN_JITTER:-10ms}"
      WAN_LOSS: "${WAN_LOSS:-1%}"
      NOTE_SCRIPT: "${PEER_A_NOTES:-}"
      CHAOS_SCRIPT: "${PEER_A_CHAOS:-}"
    command: >
      --server ws://signaling:8080
      --room ${ROOM_NAME:-e2e-test}
      --name peer-a
      --bpm 120
      --bars 4
      --quantum 4.0
    networks:
      net-a: {}
      net-infra: {}

  peer-b:
    build:
      context: .
      dockerfile: Dockerfile.test-client
    depends_on:
      signaling:
        condition: service_healthy
      peer-a:
        condition: service_started
    cap_add:
      - NET_ADMIN
    environment:
      WAN_DELAY: "${WAN_DELAY:-50ms}"
      WAN_JITTER: "${WAN_JITTER:-10ms}"
      WAN_LOSS: "${WAN_LOSS:-1%}"
      NOTE_SCRIPT: "${PEER_B_NOTES:-}"
      EXPECT_NOTES: "${PEER_A_NOTES:-}"
      CHAOS_SCRIPT: "${PEER_B_CHAOS:-}"
    command: >
      --server ws://signaling:8080
      --room ${ROOM_NAME:-e2e-test}
      --name peer-b
      --bpm 120
      --bars 4
      --quantum 4.0
      --validate
      --validate-intervals ${VALIDATE_INTERVALS:-4}
      --validate-timeout ${VALIDATE_TIMEOUT:-120}
    networks:
      net-b: {}
      net-infra: {}
